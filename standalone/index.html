<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="chat.css">
</head>
<body>
    <div class="container mt-3">

        <!-- Information card -->
        <div id="info" class="card text-white bg-secondary mb-4">
            <div class="card-body">
                <b>Anleitung</b>
                <ul class="mb-0">
                    <li>Unterhalten Sie sich mit dem Chatbot.</li>
                </ul>
            </div>
        </div>

        <!-- Chat window -->
        <div id="chatWindow" class="card border-secondary h-100 d-flex flex-column">

            <!-- Chat Messages -->
            <div id="scrollingWindow" class="flex-grow-1">
                <div class="card-body">
                    <div id="chatMessages"></div>
                    <div
                        id="typingIndicator"
                        class="typing-indicator-row"
                        aria-live="polite"
                        aria-hidden="true"
                    >
                        <div class="message-wrapper assistant">
                            <div
                                class="message assistant typing-indicator-bubble"
                                role="status"
                            >
                                <span class="typing-bubble-dot"></span>
                                <span class="typing-bubble-dot"></span>
                                <span class="typing-bubble-dot"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="card-footer">
                <div class="input-group">
                    <div class="flex-grow-1">
                        <textarea
                            class="form-control"
                            id="chatInput"
                            placeholder="Nachricht eingeben..."
                            rows="2"
                            style="resize: none;"
                            autofocus
                        ></textarea>
                    </div>
                    <button class="btn btn-primary" type="button" id="sendButton">Senden</button>
                </div>
            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script src="chat.js"></script>
</body>
</html>
